<body>

<div class="card">
    <div class="card-header">
        <h1>
            <i class="fas fa-headset"></i> 
            Abrir Novo Chamado
        </h1>
        <div class="sub-line">
            Descreva seu problema ou solicitação
        </div>
    </div>
    <div class="card-body">
        <form id="chamadoForm">
            <!-- Campo TÍTULO -->
            <div class="form-group">
                <label for="titulo">
                    <i class="fas fa-tag"></i> Título
                </label>
                <input type="text" id="titulo" name="titulo" placeholder="Ex: Problemas com acesso ao sistema, lentidão, etc." 
                       autocomplete="off" required>
                <div class="helper-text">
                    <i class="fas fa-info-circle"></i> Resumo rápido do problema
                </div>
            </div>
            
            <!-- Campo DESCRIÇÃO -->
            <div class="form-group">
                <label for="descricao">
                    <i class="fas fa-align-left"></i> Descrição
                </label>
                <textarea id="descricao" name="descricao" 
                          placeholder="Forneça mais detalhes sobre o problema ou solicitação."></textarea>
                <div class="helper-text">
                    <i class="fas fa-edit"></i> Seja claro e informe passos para reproduzir o erro, se possível.
                </div>
            </div>
            
            <div class="form-group">
                <label for="prioridade">
                    <i class="fas fa-flag-checkered"></i> Prioridade
                </label>
                <select id="prioridade" name="prioridade" required>
                    <option value="Baixa">Baixa</option>
                    <option value="Medida" selected>Medida</option>
                    <option value="Alta">Alta</option>
                    <option value="Crítica">Crítica</option>
                </select>
                <div class="helper-text">
                    <i class="fas fa-chart-line"></i> Nível de urgência para resolução
                </div>
            </div>
            
            <!-- Grupo de botões: [Enviar Chamado] [Cancelar] -->
            <div class="button-group">
                <button type="button" id="cancelarBtn" class="btn btn-secondary">
                    <i class="fas fa-times"></i> Cancelar
                </button>
                <button type="submit" id="enviarBtn" class="btn btn-primary">
                    <i class="fas fa-paper-plane"></i> Enviar Chamado
                </button>
            </div>
        </form>
    </div>
</div>

<!-- Toast para mensagens de feedback não intrusivas -->
<div id="toastMessage" class="toast-msg">
    <i class="fas fa-check-circle"></i> <span id="toastText"></span>
</div>
